name: Bug 报告
description: 提交一个 Bug 报告
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: input
    id: title
    attributes:
      label: Bug 标题
      description: 简要描述这个 Bug
      placeholder: "例：NER 面板批量确认后状态不更新"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 如何复现这个 Bug？
      placeholder: |
        1. 打开新闻编辑页面
        2. 输入包含企业名称的新闻内容
        3. 点击"识别实体"
        4. 选中多个实体，点击"批量确认"
        5. 页面状态未更新
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你认为应该发生什么？
      placeholder: "批量确认后，所有选中实体的状态应变为'已确认'"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: "点击批量确认后，状态保持不变，控制台报错..."
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: 严重程度
      description: 这个 Bug 的影响程度
      options:
        - 致命（系统崩溃或数据丢失）
        - 严重（核心功能不可用）
        - 一般（功能受损但有绕过方法）
        - 轻微（界面/体验问题）
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: 运行环境信息（浏览器、操作系统、版本号等）
      placeholder: |
        浏览器：Chrome 120
        操作系统：Windows 11
        项目版本：v1.0.0
    validations:
      required: false
