name: 开发任务
description: 从需求拆分出的开发任务
title: "[任务] "
labels: ["type:task"]
body:
  - type: input
    id: title
    attributes:
      label: 任务标题
      description: 简要描述这个开发任务
      placeholder: "例：实现 NER 确认面板的批量操作组件"
    validations:
      required: true

  - type: input
    id: requirement
    attributes:
      label: 关联需求
      description: 关联的需求 Issue 编号（如 #12）
      placeholder: "#12"
    validations:
      required: true

  - type: input
    id: spec
    attributes:
      label: 关联 Spec（可选）
      description: 关联的 Spec 文件路径或 PR 编号
      placeholder: "docs/specs/ner-confirm-panel.md 或 #25"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: 任务描述
      description: 具体要实现什么？（从 Spec 中提取的关键实现点）
      placeholder: |
        实现批量确认功能：
        - 支持多选实体
        - 点击"批量确认"按钮一次性更新状态
        - 确认后显示绿色标记
    validations:
      required: true

  - type: dropdown
    id: estimate
    attributes:
      label: 预估工时
      description: 预计需要多长时间
      options:
        - 0.5 天以内
        - 1 天
        - 2-3 天
        - 1 周
        - 1 周以上
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 怎样才算完成？
      placeholder: |
        - [ ] 可以选中多个实体
        - [ ] 点击批量确认后状态更新
        - [ ] 操作日志记录本次变更
    validations:
      required: false
