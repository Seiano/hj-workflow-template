# 氢界项目 Label 体系定义
# 可通过 GitHub CLI 或第三方 Action (如 actions/labeler) 同步到仓库
#
# 使用方法：
#   gh label create "type:requirement" --description "功能需求" --color "0075ca"
#   或使用 GitHub Actions label-sync 自动同步

# ========== 类型标签 ==========
- name: "type:requirement"
  description: "功能需求或业务需求"
  color: "0075ca"   # 蓝色

- name: "type:change-request"
  description: "对已有需求的变更请求"
  color: "e4e669"   # 黄色

- name: "type:bug"
  description: "Bug 报告"
  color: "d73a4a"   # 红色

- name: "type:task"
  description: "开发任务（从需求拆分）"
  color: "0e8a16"   # 绿色

- name: "type:spec"
  description: "功能规格文档"
  color: "5319e7"   # 紫色

# ========== 状态标签（需求流） ==========
- name: "status:new"
  description: "新提交，待处理"
  color: "c5def5"

- name: "status:refining"
  description: "AI 正在细化需求"
  color: "fbca04"

- name: "status:confirmed"
  description: "客户已确认"
  color: "0e8a16"

- name: "status:analyzing"
  description: "需求分析进行中"
  color: "006b75"

- name: "status:spec-ready"
  description: "Spec 已就绪，等待开发"
  color: "5319e7"

- name: "status:in-dev"
  description: "开发中"
  color: "1d76db"

- name: "status:done"
  description: "已完成并合入主分支"
  color: "0e8a16"

# ========== 状态标签（变更流） ==========
- name: "status:pending-review"
  description: "变更待评审"
  color: "b60205"

- name: "status:impact-assessed"
  description: "影响已评估"
  color: "fbca04"

- name: "status:approved"
  description: "变更已批准"
  color: "0e8a16"

- name: "status:rejected"
  description: "变更已拒绝"
  color: "b60205"

# ========== 优先级标签 ==========
- name: "priority:P0"
  description: "必须有 - 上线必备"
  color: "b60205"   # 红色

- name: "priority:P1"
  description: "应该有 - 核心体验"
  color: "e4e669"   # 黄色

- name: "priority:P2"
  description: "可以有 - 锦上添花"
  color: "0e8a16"   # 绿色

# ========== 模块标签 ==========
- name: "module:ner"
  description: "NER 实体识别模块"
  color: "7057ff"

- name: "module:enterprise"
  description: "企业库模块"
  color: "7057ff"

- name: "module:news"
  description: "资讯库模块"
  color: "7057ff"

- name: "module:resource"
  description: "资源管理模块"
  color: "7057ff"

- name: "module:tags"
  description: "标签管理模块"
  color: "7057ff"

- name: "module:infra"
  description: "基础设施（Schema 引擎、数据层等）"
  color: "7057ff"
