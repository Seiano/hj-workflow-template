# Label 体系定义
# 可通过 GitHub CLI 同步到仓库: gh label create "name" --description "desc" --color "color"
# 项目使用时，根据业务模块自行添加 module:* 标签

# ========== 类型标签 ==========
- name: "type:requirement"
  description: "功能需求或业务需求"
  color: "0075ca"

- name: "type:change-request"
  description: "对已有需求的变更请求"
  color: "e4e669"

- name: "type:bug"
  description: "Bug 报告"
  color: "d73a4a"

- name: "type:task"
  description: "开发任务（从需求拆分）"
  color: "0e8a16"

- name: "type:spec"
  description: "功能规格文档"
  color: "5319e7"

# ========== 状态标签（需求流） ==========
- name: "status:new"
  description: "新提交，待处理"
  color: "c5def5"

- name: "status:refining"
  description: "AI 正在细化需求"
  color: "fbca04"

- name: "status:confirmed"
  description: "客户已确认"
  color: "0e8a16"

- name: "status:analyzing"
  description: "需求分析进行中"
  color: "006b75"

- name: "status:spec-ready"
  description: "Spec 已就绪，等待开发"
  color: "5319e7"

- name: "status:in-dev"
  description: "开发中"
  color: "1d76db"

- name: "status:done"
  description: "已完成并合入主分支"
  color: "0e8a16"

# ========== 状态标签（变更流） ==========
- name: "status:pending-review"
  description: "变更待评审"
  color: "b60205"

- name: "status:impact-assessed"
  description: "影响已评估"
  color: "fbca04"

- name: "status:approved"
  description: "变更已批准"
  color: "0e8a16"

- name: "status:rejected"
  description: "变更已拒绝"
  color: "b60205"

# ========== 优先级标签 ==========
- name: "priority:P0"
  description: "必须有 - 上线必备"
  color: "b60205"

- name: "priority:P1"
  description: "应该有 - 核心体验"
  color: "e4e669"

- name: "priority:P2"
  description: "可以有 - 锦上添花"
  color: "0e8a16"

# ========== 模块标签（项目按需自定义） ==========
# 使用说明：根据项目业务模块自行添加 module:* 标签
# 示例:
#   - name: "module:user"
#     description: "用户模块"
#     color: "7057ff"
