name: Qoder 需求文档评审

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'docs/research/**'
      - 'docs/analysis/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  review-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Qoder 需求文档评审
        uses: QoderAI/qoder-action@v0
        with:
          qoder_personal_access_token: ${{ secrets.QODER_PERSONAL_ACCESS_TOKEN }}
          prompt: |
            /assistant
            REPO:${{ github.repository }}
            ISSUE_NUMBER:${{ github.event.pull_request.number }}
            COMMENT: 请作为需求评审 Agent，对本次 PR 中 docs/research/ 或 docs/analysis/ 目录下的文档进行评审。按照 .qoder/agents/requirements-reviewer.md 中定义的评审标准和评分规则，输出完整的评审报告。评审结论标注为"通过"或"需修改"。OUTPUT_LANGUAGE: Chinese
